<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ImageAI Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    #editor_container { width: 100%; height: 100%; }
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      flex-direction: column; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; z-index: 9999;
      background: #1a1a2e;
    }
    #loading .spinner {
      width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #4fc3f7; border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { margin-top: 16px; font-size: 14px; opacity: 0.7; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>正在加载编辑器...</p>
  </div>
  <div id="editor_container"></div>

  <script src="./filerobot-image-editor.min.js"></script>
  <script src="./init.js"></script>
</body>
</html>
